<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <link rel="icon" href="/favicon.png" type="image/png" />
    <title>Asper Beauty Shop</title>
    <meta name="description" content="Asper Beauty Shop — The Sanctuary of Science. Clinical luxury skincare, curated by pharmacists." />

    <!-- Preconnect to Google Fonts CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta name="author" content="Asper Beauty Shop" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Asper Beauty Shop" />
    <meta property="og:description" content="The Sanctuary of Science — Clinical luxury skincare, curated by pharmacists." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Asper Beauty Shop",
      "description": "The Sanctuary of Science — Clinical luxury skincare, curated by pharmacists.",
      "url": "https://asperbeautyshop.lovable.app",
      "logo": "https://asperbeautyshop.lovable.app/favicon.png",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Arabic"]
      }
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Asper Beauty Shop",
      "url": "https://asperbeautyshop.lovable.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://asperbeautyshop.lovable.app/products?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
